server {
  listen 4173;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;

  location = /state-layers {
    try_files /state-layers/index.html =404;
  }

  location /state-layers/assets/ {
    try_files $uri =404;
  }

  location /state-layers/ {
    try_files $uri $uri/ /state-layers/index.html;
  }

  location / {
    return 404;
  }
}
